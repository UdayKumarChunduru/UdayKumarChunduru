# File:          .github/workflows/metrics.yml
# Author:        Uday Kumar Chunduru
# Created:       2026-05-26
# Last Modified: 2026-05-30
#
# Description:
#   Generates GitHub profile metrics SVGs and commits them back.
#
#   SCHEDULE LOGIC (fixed from v1):
#   - Cron runs at 18:30 UTC every day (= 00:00 IST)
#   - Before generating anything, checks GitHub API for PushEvents
#     that happened TODAY in IST (not "last 24 hours" — today's date only)
#   - If no commits today: exits cleanly, no commit, no noise
#   - If commits found today: regenerates all two SVGs and commits
#   - Push to this profile repo itself: always regenerates immediately
#
#   - lowlighter/metrics with output_action:none saves SVGs to
#     /metrics_renders/ inside Docker container, NOT $GITHUB_WORKSPACE
#   - Added explicit copy step from /metrics_renders/metrics/ to workspace
#
#   - plugin_activity requires base to not skip header metadata
#   - Fixed base setting for activity job
#
# Required secret:
#   METRICS_TOKEN: GitHub PAT with scopes: read:user, public_repo
#   Add at: Settings > Secrets and variables > Actions > METRICS_TOKEN


name: Daily Metrics (Yesterdays Activity)

on:
  schedule:
    # 18:30 UTC = 00:00 IST (next calendar day)
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Check yesterday's IST PushEvents ──
      - name: Check for PushEvents during previous IST day
        id: check
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          PREV_DAY=$(TZ='Asia/Kolkata' date -d 'yesterday' +%Y-%m-%d)
          START_IST="${PREV_DAY}T00:00:00+05:30"
          END_IST="${PREV_DAY}T23:59:59+05:30"
          START_EPOCH=$(date -d "$START_IST" +%s)
          END_EPOCH=$(date -d "$END_IST" +%s)

          echo "Checking for PushEvents between $(date -d @$START_EPOCH -u -Iseconds) and $(date -d @$END_EPOCH -u -Iseconds)"

          PAGE=1
          HAS_COMMITS=false
          while : ; do
            EVENTS=$(gh api "/users/${{ github.repository_owner }}/events?per_page=100&page=$PAGE" \
                     --jq '.[] | select(.type=="PushEvent") | .created_at')
            if [[ -z "$EVENTS" ]]; then
              break
            fi
            while IFS= read -r event_time; do
              EVENT_EPOCH=$(date -d "$event_time" +%s)
              if [[ $EVENT_EPOCH -ge $START_EPOCH && $EVENT_EPOCH -le $END_EPOCH ]]; then
                HAS_COMMITS=true
                break 2
              fi
            done <<< "$EVENTS"
            PAGE=$((PAGE + 1))
          done

          echo "has_commits=$HAS_COMMITS" >> $GITHUB_OUTPUT
          echo "Has commits yesterday (IST): $HAS_COMMITS"

      # ── ONLY if commits were found yesterday ──
      # ── Stats ──
      - name: Generate stats metrics
        if: steps.check.outputs.has_commits == 'true'
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: UdayKumarChunduru
          filename: metrics/stats.svg
          base: header, repositories, metadata
          config_animations: yes
          config_timezone: Asia/Kolkata
          config_padding: 4%, 4%
          output_action: none

      # ── Languages ──
      - name: Generate language metrics
        if: steps.check.outputs.has_commits == 'true'
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: UdayKumarChunduru
          filename: metrics/languages.svg
          base: ""
          plugin_languages: true
          # plugin_languages_ignored: html, css, dockerfile, shell
          # plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          config_animations: yes
          config_timezone: Asia/Kolkata
          config_padding: 4%, 4%
          output_action: none

      # ── Copy generated SVGs into workspace ──
      - name: Copy SVGs from Docker output to workspace
        if: steps.check.outputs.has_commits == 'true'
        run: |
          mkdir -p metrics
          for f in stats.svg languages.svg; do
            if [ -f /metrics_renders/metrics/$f ]; then
              cp /metrics_renders/metrics/$f metrics/$f
            else
              echo "::warning::Generated file $f not found"
            fi
          done

      # ── Commit only if SVGs actually changed ──
      - name: Commit and push updated SVGs
        if: steps.check.outputs.has_commits == 'true'
        run: |
          git add metrics/stats.svg metrics/languages.svg
          if git diff --staged --quiet; then
            echo "No changes to metrics SVGs – nothing to commit"
          else
            TIMESTAMP=$(TZ="Asia/Kolkata" date "+%Y-%m-%d %H:%M IST")
            git commit -m "chore: update metrics [${TIMESTAMP}] [skip ci]"
            git push
          fi
